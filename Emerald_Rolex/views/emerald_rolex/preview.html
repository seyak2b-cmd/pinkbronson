<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Emerald Rolex - CSS Preview</title>
    <style>
        /* ── Layout ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            height: 100vh;
            background: #080c00;
            font-family: 'MS Gothic', 'Meiryo', 'Courier New', monospace;
            color: #AAFF00;
            overflow: hidden;
        }

        /* ── Left: Controls ── */
        #controls {
            width: 340px;
            min-width: 300px;
            background: #0C1800;
            border-right: 2px solid #2A4400;
            overflow-y: auto;
            padding: 16px 14px 80px 14px;
            flex-shrink: 0;
            position: relative;
        }

        #controls h1 {
            font-size: 13px;
            color: #AAFF00;
            margin-bottom: 14px;
            border-bottom: 1px solid #2A4400;
            padding-bottom: 6px;
            letter-spacing: 1px;
        }

        .section {
            margin-bottom: 14px;
            border: 1px solid #2A4400;
            border-radius: 4px;
            padding: 8px 10px;
        }

        .section h2 {
            font-size: 10px;
            color: #4A7000;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* slider rows */
        .row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .row label {
            font-size: 10px;
            color: #88AA44;
            width: 90px;
            flex-shrink: 0;
        }

        input[type=range] {
            flex: 1;
            accent-color: #AAFF00;
            height: 4px;
        }

        .val {
            font-size: 10px;
            color: #CCFF88;
            width: 36px;
            text-align: right;
            flex-shrink: 0;
        }

        /* checkboxes */
        .chk-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 6px;
        }

        .chk-row label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #CCFF88;
            cursor: pointer;
        }

        input[type=checkbox] {
            accent-color: #AAFF00;
        }

        /* radio */
        .radio-row {
            display: flex;
            gap: 16px;
        }

        .radio-row label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #CCFF88;
            cursor: pointer;
        }

        input[type=radio] {
            accent-color: #AAFF00;
        }

        /* color picker */
        .color-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .color-row label {
            font-size: 10px;
            color: #88AA44;
            width: 90px;
        }

        input[type=color] {
            width: 36px;
            height: 22px;
            border: 1px solid #2A4400;
            background: transparent;
            cursor: pointer;
            border-radius: 3px;
        }

        /* copy button */
        #copy-btn {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 340px;
            padding: 12px;
            background: #AAFF00;
            color: #000;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.1s;
        }

        #copy-btn:hover {
            background: #CCFF88;
        }

        #copy-toast {
            position: fixed;
            bottom: 52px;
            left: 0;
            width: 340px;
            text-align: center;
            font-size: 10px;
            color: #AAFF00;
            background: #0C1800;
            padding: 4px;
            display: none;
        }

        /* ── Right: Preview ── */
        #preview-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: transparent;
            /* checker grid to show transparency */
            background-image:
                linear-gradient(45deg, #111 25%, transparent 25%),
                linear-gradient(-45deg, #111 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #111 75%),
                linear-gradient(-45deg, transparent 75%, #111 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        }

        #preview-chat {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            height: 100%;
            padding: 20px 24px 40px 24px;
            gap: 10px;
        }

        #preview-area.align-right #preview-chat {
            align-items: flex-end;
        }
    </style>
</head>

<body>

    <!-- ═══ Controls ═══ -->
    <div id="controls">
        <h1>⚙ Emerald Rolex Preview</h1>

        <!-- 表示 ON/OFF -->
        <div class="section">
            <h2>表示 ON/OFF</h2>
            <div class="chk-row">
                <label><input type="checkbox" id="chk-icon" checked> 🖼 アイコン</label>
                <label><input type="checkbox" id="chk-badge" checked> 🏅 バッジ</label>
                <label><input type="checkbox" id="chk-name" checked> 👤 ユーザー名</label>
                <label><input type="checkbox" id="chk-comment" checked> 💬 コメント</label>
            </div>
            <div class="radio-row">
                <label><input type="radio" name="align" value="left" checked> ◀ 左寄せ</label>
                <label><input type="radio" name="align" value="right"> ▶ 右寄せ</label>
            </div>
        </div>

        <!-- サイズ -->
        <div class="section">
            <h2>サイズ</h2>
            <div class="row">
                <label>アイコン</label>
                <input type="range" id="sl-icon" min="16" max="80" value="34">
                <span class="val" id="v-icon">34px</span>
            </div>
            <div class="row">
                <label>バッジ</label>
                <input type="range" id="sl-badge" min="10" max="40" value="20">
                <span class="val" id="v-badge">20px</span>
            </div>
            <div class="row">
                <label>ユーザー名</label>
                <input type="range" id="sl-name" min="8" max="32" value="15">
                <span class="val" id="v-name">15px</span>
            </div>
            <div class="row">
                <label>コメント</label>
                <input type="range" id="sl-comment" min="10" max="48" value="20">
                <span class="val" id="v-comment">20px</span>
            </div>
            <div class="row">
                <label>泡の最大幅</label>
                <input type="range" id="sl-maxw" min="100" max="800" value="460" step="10">
                <span class="val" id="v-maxw">460px</span>
            </div>
        </div>

        <!-- 枠 -->
        <div class="section">
            <h2>枠</h2>
            <div class="row">
                <label>角丸</label>
                <input type="range" id="sl-radius" min="0" max="60" value="4">
                <span class="val" id="v-radius">4px</span>
            </div>
            <div class="row">
                <label>太さ</label>
                <input type="range" id="sl-bwidth" min="0" max="8" value="2">
                <span class="val" id="v-bwidth">2px</span>
            </div>
            <div class="row">
                <label>アウトライン</label>
                <input type="range" id="sl-outline" min="0" max="6" value="2">
                <span class="val" id="v-outline">2px</span>
            </div>
        </div>

        <!-- 色 -->
        <div class="section">
            <h2>カラー</h2>
            <div class="color-row">
                <label>ネオン</label>
                <input type="color" id="col-neon" value="#AAFF00">
                <span style="font-size:10px;color:#88AA44">（枠・名前グロー）</span>
            </div>
            <div class="color-row">
                <label>テキスト</label>
                <input type="color" id="col-text" value="#CCFF88">
            </div>
            <div class="color-row">
                <label>背景</label>
                <input type="color" id="col-bg" value="#0C1800">
            </div>
            <div class="color-row">
                <label>枠線</label>
                <input type="color" id="col-border" value="#88CC00">
            </div>
            <div class="color-row">
                <label>アウトライン</label>
                <input type="color" id="col-outline" value="#2A4400">
            </div>
        </div>

        <!-- パディング -->
        <div class="section">
            <h2>パディング (泡の内側余白)</h2>
            <div class="row">
                <label>上下</label>
                <input type="range" id="sl-pv" min="0" max="30" value="10">
                <span class="val" id="v-pv">10px</span>
            </div>
            <div class="row">
                <label>左右</label>
                <input type="range" id="sl-ph" min="0" max="40" value="14">
                <span class="val" id="v-ph">14px</span>
            </div>
        </div>

        <button id="copy-btn" onclick="copyCSS()">📋 OBS 用 CSS を生成してコピー</button>
        <div id="copy-toast">✅ クリップボードにコピーしました</div>
    </div>

    <!-- ═══ Preview Area ═══ -->
    <div id="preview-area">
        <div id="preview-chat">
            <!-- messages injected by JS -->
        </div>
    </div>

    <!-- Dynamic style injection -->
    <style id="dynamic-style"></style>

    <script>
        // ── サンプルメッセージ ──
        const SAMPLES = [
            {
                name: "せやのサ行ちゃんねる", badge: "broadcaster",
                color: "#FF7F50", msg: "こんにちは！配信みにきてね 🎮"
            },
            {
                name: "TestModerator", badge: "moderator",
                color: "#AAFF00", msg: "ルールを守って楽しもう！"
            },
            {
                name: "VIPUser", badge: "vip",
                color: "#CC44FF", msg: "今日の配信もよかった！"
            },
            {
                name: "SubUser123", badge: "subscriber",
                color: "#FFD700", msg: "サブスクありがとうございます 🎉"
            },
        ];

        // バッジ CDN
        const BADGE_CDN = {
            broadcaster: "https://static-cdn.jtvnw.net/badges/v1/5527c58c-fb7d-422d-b71b-f309dcb85cc1/2",
            moderator: "https://static-cdn.jtvnw.net/badges/v1/3267646d-33f0-4b17-b3df-f923a41db1d6/2",
            vip: "https://static-cdn.jtvnw.net/badges/v1/b817aba4-fad8-49e2-b88a-7cc744dfa6ec/2",
            subscriber: "https://static-cdn.jtvnw.net/badges/v1/86828e5e-d523-4f80-8a42-c4f7c9171b58/2",
        };

        // ── 状態 ──
        const state = {
            showIcon: true, showBadge: true, showName: true, showComment: true,
            align: "left",
            iconSz: 34, badgeSz: 20, nameSz: 15, commentSz: 20, maxWidth: 460,
            radius: 4, bwidth: 2, outline: 2,
            neon: "#AAFF00", text: "#CCFF88", bg: "#0C1800", border: "#88CC00", outlineC: "#2A4400",
            pv: 10, ph: 14,
        };

        // ── スライダー読み取り ──
        function bind(id, key, suffix, valId) {
            const el = document.getElementById(id);
            el.addEventListener("input", () => {
                state[key] = Number(el.value);
                document.getElementById(valId).textContent = el.value + suffix;
                apply();
            });
        }
        function bindChk(id, key) {
            const el = document.getElementById(id);
            el.addEventListener("change", () => { state[key] = el.checked; apply(); });
        }
        function bindCol(id, key) {
            const el = document.getElementById(id);
            el.addEventListener("input", () => { state[key] = el.value; apply(); });
        }

        bind("sl-icon", "iconSz", "px", "v-icon");
        bind("sl-badge", "badgeSz", "px", "v-badge");
        bind("sl-name", "nameSz", "px", "v-name");
        bind("sl-comment", "commentSz", "px", "v-comment");
        bind("sl-maxw", "maxWidth", "px", "v-maxw");
        bind("sl-radius", "radius", "px", "v-radius");
        bind("sl-bwidth", "bwidth", "px", "v-bwidth");
        bind("sl-outline", "outline", "px", "v-outline");
        bind("sl-pv", "pv", "px", "v-pv");
        bind("sl-ph", "ph", "px", "v-ph");

        bindChk("chk-icon", "showIcon");
        bindChk("chk-badge", "showBadge");
        bindChk("chk-name", "showName");
        bindChk("chk-comment", "showComment");

        document.querySelectorAll("input[name=align]").forEach(r => {
            r.addEventListener("change", () => { state.align = r.value; apply(); });
        });

        bindCol("col-neon", "neon");
        bindCol("col-text", "text");
        bindCol("col-bg", "bg");
        bindCol("col-border", "border");
        bindCol("col-outline", "outlineC");

        // ── CSS 生成 ──
        function buildCSS(forOBS = false) {
            const s = state;
            const alignItems = s.align === "right" ? "flex-end" : "flex-start";
            const rowDir = s.align === "right" ? "row-reverse" : "row";
            const msgAlign = s.align === "right" ? "right" : "left";
            const msgSelf = s.align === "right" ? "align-self:flex-end; " : "";

            const hideIcon = !s.showIcon ? "\n.avatar-wrap { display:none !important; }" : "";
            const hideBadge = !s.showBadge ? "\n.badge-wrap  { display:none !important; }" : "";
            const hideName = !s.showName ? "\n.username    { display:none !important; }" : "";
            const hideComment = !s.showComment ? "\n.message     { display:none !important; }" : "";

            // アイコンのみ → pill 型
            let pillTweak = "";
            if (s.showIcon && !s.showComment) {
                pillTweak = `
.chat-msg { background:transparent !important; border-radius:9999px !important;
    padding:4px 10px 4px 4px !important; outline:none !important; box-shadow:none !important; }
.user-row { padding-bottom:0 !important; margin-bottom:0 !important; border-bottom:none !important; }`;
            }

            const prefix = forOBS ? `/* Emerald Rolex - OBS Custom CSS (プレビューから生成) */
body { margin:0; padding:0; background:rgba(0,0,0,0); overflow:hidden;
       font-family:'MS Gothic','Meiryo','Courier New',monospace; }
#chat-container { display:flex; flex-direction:column; justify-content:flex-end;
    align-items:${alignItems}; height:100vh; max-height:100vh; overflow:hidden;
    padding:10px 16px 20px 16px; gap:8px; box-sizing:border-box; }` : "";

            return `${prefix}
.chat-msg { ${msgSelf}position:relative; max-width:${s.maxWidth}px; min-width:60px;
    background:${s.bg}; border:${s.bwidth}px solid ${s.border}; border-radius:${s.radius}px;
    padding:${s.pv}px ${s.ph}px;
    ${s.outline > 0 ? `outline:${s.outline}px solid ${s.outlineC}; outline-offset:-${s.outline + 2}px;` : ""}
    opacity:0; transform:translateY(8px);
    animation:erPopIn 0.2s ease-out forwards; will-change:transform,opacity; }
@keyframes erPopIn { to { opacity:1; transform:translateY(0); } }
.user-row { display:flex; align-items:center; flex-direction:${rowDir}; gap:7px;
    padding-bottom:6px; margin-bottom:4px; border-bottom:1px dashed ${s.outlineC}; }
.avatar-wrap { flex-shrink:0; width:${s.iconSz}px; height:${s.iconSz}px; }
.avatar { width:${s.iconSz}px; height:${s.iconSz}px; border-radius:50%;
    border:${s.bwidth}px solid ${s.border}; object-fit:cover; display:block; }
.avatar-ph { width:${s.iconSz}px; height:${s.iconSz}px; border-radius:50%;
    border:${s.bwidth}px solid ${s.outlineC}; background:${s.bg};
    display:flex; align-items:center; justify-content:center;
    font-size:${Math.round(s.iconSz * 0.44)}px; font-weight:bold; color:${s.neon}; }
.badge-img { width:${s.badgeSz}px; height:${s.badgeSz}px; object-fit:contain; flex-shrink:0; }
.badge-txt { font-size:${Math.max(7, Math.round(s.badgeSz * 0.55))}px; font-weight:bold;
    padding:1px 4px; border-radius:2px; text-transform:uppercase; }
.badge-txt.broadcaster{background:#FF0055;color:#fff} .badge-txt.moderator{background:${s.neon};color:#000}
.badge-txt.vip{background:#CC00FF;color:#fff} .badge-txt.subscriber{background:#FFD700;color:#000}
.username { font-size:${s.nameSz}px; font-weight:bold; color:${s.text};
    text-shadow:1px 1px 0 #000,0 0 8px ${s.neon}; line-height:1; word-break:break-all; }
.message { font-size:${s.commentSz}px; color:${s.text}; text-align:${msgAlign};
    line-height:1.5; word-break:break-word;
    text-shadow:1px 1px 0 #000,-1px -1px 0 #000; }${hideIcon}${hideBadge}${hideName}${hideComment}${pillTweak}`;
        }

        // ── プレビュー更新 ──
        function apply() {
            // 動的スタイル注入
            document.getElementById("dynamic-style").textContent = buildCSS(false);

            // 整列
            const area = document.getElementById("preview-area");
            area.classList.toggle("align-right", state.align === "right");
            document.getElementById("preview-chat").style.alignItems =
                state.align === "right" ? "flex-end" : "flex-start";

            // メッセージ再生成
            renderSamples();
        }

        function renderSamples() {
            const chat = document.getElementById("preview-chat");
            chat.innerHTML = "";
            SAMPLES.forEach(s => {
                const el = document.createElement("div");
                el.className = "chat-msg";

                const initial = s.name[0].toUpperCase();
                const avatarHtml = `<div class="avatar-wrap">
            <div class="avatar-ph">${initial}</div>
        </div>`;

                const bdgSrc = BADGE_CDN[s.badge] || "";
                const badgeHtml = bdgSrc
                    ? `<div class="badge-wrap"><img class="badge-img" src="${bdgSrc}" alt="${s.badge}"
               onerror="this.style.display='none'"></div>`
                    : `<div class="badge-wrap"><span class="badge-txt ${s.badge}">${s.badge[0].toUpperCase()}</span></div>`;

                const ns = `style="color:${s.color}; text-shadow:1px 1px 0 #000,0 0 8px ${s.color};"`;
                el.innerHTML = `
            <div class="user-row">
                ${avatarHtml}
                ${badgeHtml}
                <span class="username" ${ns}>${s.name}</span>
            </div>
            <div class="message">${s.msg}</div>`;

                // pop-in animation reset hack
                void el.offsetWidth;
                chat.appendChild(el);
                // re-trigger after a tick so animation fires each time
                requestAnimationFrame(() => { el.style.animation = "none"; el.style.opacity = "1"; el.style.transform = "none"; });
            });
        }

        // ── CSS コピー ──
        function copyCSS() {
            const css = buildCSS(true);
            navigator.clipboard.writeText(css).then(() => {
                const toast = document.getElementById("copy-toast");
                toast.style.display = "block";
                setTimeout(() => { toast.style.display = "none"; }, 2500);
            });
        }

        // ── 初期描画 ──
        apply();
    </script>
</body>

</html>
