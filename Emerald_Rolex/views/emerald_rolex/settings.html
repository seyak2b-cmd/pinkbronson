<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Emerald Rolex Settings</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0A1200;
            --surface: #1A2900;
            --surface2: #0C1800;
            --accent: #AAFF00;
            --text: #CCFF88;
            --text-muted: #558800;
            --border: #2A4400;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            padding: 24px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px dashed var(--border);
        }

        header h1 {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--accent);
        }

        header p {
            font-size: 0.8em;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 800px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .card-title {
            font-size: 0.85em;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 18px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        .row:last-child {
            margin-bottom: 0;
        }

        .row label {
            font-size: 0.9em;
            flex-shrink: 0;
            min-width: 110px;
        }

        .row select,
        .row input[type="text"],
        .row input[type="range"] {
            flex: 1;
            padding: 8px 12px;
            background: var(--surface2);
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Toggle */
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            display: inline-block;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider-toggle {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: .3s;
        }

        .slider-toggle:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-muted);
            border-radius: 50%;
            transition: .3s;
        }

        input:checked+.slider-toggle {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        input:checked+.slider-toggle:before {
            transform: translateX(20px);
            background-color: #000;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 4px;
            border: none;
            font-size: 0.9em;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* Status Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border-radius: 4px;
            font-weight: bold;
            transform: translateY(100px);
            opacity: 0;
            transition: 0.3s;
            z-index: 999;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">💎</div>
        <div>
            <h1>Emerald Rolex Settings</h1>
            <p>OBS Chat Viewer Display Customizer (Real-time Firebase Sync)</p>
        </div>
    </header>

    <div class="layout">
        <div class="card">
            <div class="card-title">🎛️ 表示・デザイン設定</div>

            <div class="row">
                <label>文字サイズ</label>
                <input type="range" id="er_fontSize" min="12" max="40" step="1" value="20">
                <span id="er_fontSizeVal" style="width: 40px; text-align: right;">20px</span>
            </div>

            <div class="row">
                <label>アイコンサイズ</label>
                <input type="range" id="er_iconSize" min="20" max="64" step="2" value="34">
                <span id="er_iconSizeVal" style="width: 40px; text-align: right;">34px</span>
            </div>

            <div class="row" style="margin-top: 24px;">
                <label>ユーザー名</label>
                <label class="toggle"><input type="checkbox" id="er_showName" checked><span
                        class="slider-toggle"></span></label>
            </div>
            <div class="row">
                <label>アイコン</label>
                <label class="toggle"><input type="checkbox" id="er_showIcons" checked><span
                        class="slider-toggle"></span></label>
            </div>
            <div class="row">
                <label>バッジ</label>
                <label class="toggle"><input type="checkbox" id="er_showBadges" checked><span
                        class="slider-toggle"></span></label>
            </div>
            <div class="row">
                <label>コメント本文</label>
                <label class="toggle"><input type="checkbox" id="er_showComment" checked><span
                        class="slider-toggle"></span></label>
            </div>

            <div class="row" style="margin-top: 24px;">
                <label>配置（左右）</label>
                <select id="er_alignDir">
                    <option value="left">◀ 左寄せ</option>
                    <option value="right">▶ 右寄せ</option>
                </select>
            </div>

            <div style="margin-top: 30px; display:flex; justify-content:flex-end;">
                <div class="toast" id="savedToast">✅ 更新しました！</div>
                <button class="btn btn-primary" onclick="saveSettings()">💾 設定を反映</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🖥️ プレビュー (Preview)</div>
            <iframe id="previewFrame" src="index.html"
                style="width: 100%; height: 500px; border: 2px solid var(--border); border-radius: 4px; background: transparent;"></iframe>
        </div>
    </div>

    <script>
        const DEFAULTS = {
            fontSize: 20, iconSize: 34,
            showName: true, showIcons: true, showBadges: true, showComment: true,
            alignDir: 'left'
        };

        const configMap = [
            { id: 'er_fontSize', key: 'fontSize', type: 'range', disp: 'er_fontSizeVal', suffix: 'px' },
            { id: 'er_iconSize', key: 'iconSize', type: 'range', disp: 'er_iconSizeVal', suffix: 'px' },
            { id: 'er_showName', key: 'showName', type: 'checkbox' },
            { id: 'er_showIcons', key: 'showIcons', type: 'checkbox' },
            { id: 'er_showBadges', key: 'showBadges', type: 'checkbox' },
            { id: 'er_showComment', key: 'showComment', type: 'checkbox' },
            { id: 'er_alignDir', key: 'alignDir', type: 'select' }
        ];

        let database;

        // 値のリアルタイム反映 (表示用)
        configMap.forEach(c => {
            if (c.type === 'range' && c.disp) {
                const el = document.getElementById(c.id);
                el.addEventListener('input', () => {
                    document.getElementById(c.disp).textContent = el.value + c.suffix;
                });
            }
        });

        // Firebase 初期化
        const firebaseConfig = {
            apiKey: "AIzaSyAjkMsdvypCH4BsoNcjSNp8GX6_bLbKsA8",
            authDomain: "seya-chat-trans.firebaseapp.com",
            databaseURL: "https://seya-chat-trans-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "seya-chat-trans"
        };
        firebase.initializeApp(firebaseConfig);
        database = firebase.database();

        function loadSettings() {
            database.ref('emerald_rolex/settings').once('value').then(snap => {
                let s = { ...DEFAULTS };
                if (snap.exists()) {
                    s = { ...DEFAULTS, ...snap.val() };
                } else {
                    const l = localStorage.getItem('erSettings');
                    if (l) try { s = { ...DEFAULTS, ...JSON.parse(l) }; } catch (e) { }
                }
                configMap.forEach(c => {
                    const el = document.getElementById(c.id);
                    if (!el) return;
                    if (c.type === 'checkbox') el.checked = !!s[c.key];
                    else {
                        el.value = s[c.key];
                        if (c.disp) document.getElementById(c.disp).textContent = el.value + c.suffix;
                    }
                });
            });
        }

        function saveSettings() {
            const s = { ...DEFAULTS };
            configMap.forEach(c => {
                const el = document.getElementById(c.id);
                if (!el) return;
                if (c.type === 'checkbox') s[c.key] = el.checked;
                else if (c.type === 'range') s[c.key] = parseInt(el.value, 10);
                else s[c.key] = el.value;
            });

            localStorage.setItem('erSettings', JSON.stringify(s));

            database.ref('emerald_rolex/settings').set(s).then(() => {
                const toast = document.getElementById('savedToast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }).catch(e => {
                console.error("Firebase save error", e);
                alert("保存に失敗しました。");
            });
        }

        // 初期ロード
        loadSettings();
    </script>
</body>

</html>
