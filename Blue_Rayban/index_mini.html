<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Mini Mode - Twitch Chat</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');

        :root {
            --bg-color: rgba(30, 40, 20, 0.85);
            /* 半透明のくすんだ緑 */
            --name-color: #d5f0a0;
            --font-size: 16px;
            --border-radius: 20px;
            /* 丸っこく */
            --icon-size: 32px;
            --anim-duration: 0.4s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: transparent;
            padding: 10px;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            /* 下からせり上がる */
        }

        body.stack-mode {
            justify-content: flex-start;
            /* 上から積み上がる */
        }

        #chat-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .chat-message {
            position: relative;
            width: fit-content;
            /* これがないと横幅いっぱいになり、右のしっぽが画面外に消えてしまいます！ */
            max-width: 90%;
            background: var(--bg-color);
            border-radius: var(--border-radius);
            padding: 6px 14px 6px 6px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            animation: chatSlideIn var(--anim-duration) forwards;
            opacity: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
            /* 中身の幅に合わせる */
        }

        @keyframes chatSlideIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fading-out {
            animation: chatFadeOut 0.5s ease forwards !important;
        }

        @keyframes chatFadeOut {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        .user-icon,
        .user-icon-placeholder {
            width: var(--icon-size);
            height: var(--icon-size);
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
        }

        .user-icon-placeholder {
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--icon-size) * 0.5);
        }

        .badge {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        .user-name {
            font-weight: bold;
            font-size: var(--font-size);
            color: var(--name-color);
            white-space: nowrap;
        }

        /* アイコン＋バッジのグループ */
        .icon-badge-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badges {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        /* バッジの配置（左） */
        #chat-container[data-badge-pos="left"] .icon-badge-group {
            flex-direction: row-reverse;
        }

        /* バッジの配置（下） */
        #chat-container[data-badge-pos="bottom"] .icon-badge-group {
            flex-direction: column;
            gap: 2px;
        }

        /* 非表示クラス */
        .hide-icons .user-icon,
        .hide-icons .user-icon-placeholder {
            display: none !important;
        }

        .hide-badges .badges {
            display: none !important;
        }

        .hide-names .user-name {
            display: none !important;
        }

        /* ========================
           テーマ・装飾設定
           ======================== */

        /* 吹き出しマージン調整 */
        #chat-container[data-tail="left"] .chat-message,
        #chat-container[data-tail="top-left"] .chat-message,
        #chat-container[data-tail="bottom-left"] .chat-message {
            margin-left: 14px;
        }

        #chat-container[data-tail="right"] .chat-message,
        #chat-container[data-tail="top-right"] .chat-message,
        #chat-container[data-tail="bottom-right"] .chat-message {
            margin-right: 14px;
        }

        /* ---- モダン（通常）のしっぽ ◣ や ◢ ---- */
        #chat-container[data-theme="modern"][data-tail="left"] .chat-message::before {
            content: '';
            position: absolute;
            bottom: 12px;
            left: -10px;
            border-bottom: 10px solid var(--bg-color);
            border-left: 10px solid transparent;
            transition: bottom 0.2s;
        }

        #chat-container[data-theme="modern"][data-tail="right"] .chat-message::after {
            content: '';
            position: absolute;
            bottom: 12px;
            right: -10px;
            border-bottom: 10px solid var(--bg-color);
            border-right: 10px solid transparent;
            transition: bottom 0.2s;
        }

        /* バッジがある場合、しっぽを少し下げる（バランス調整） */
        #chat-container[data-theme="modern"][data-tail="left"] .chat-message.has-badges::before,
        #chat-container[data-theme="modern"][data-tail="right"] .chat-message.has-badges::after {
            bottom: 4px;
        }

        /* モダン斜めしっぽ */
        #chat-container[data-theme="modern"][data-tail="top-left"] .chat-message::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 14px;
            border-bottom: 10px solid var(--bg-color);
            border-right: 10px solid transparent;
        }

        #chat-container[data-theme="modern"][data-tail="top-right"] .chat-message::after {
            content: '';
            position: absolute;
            top: -10px;
            right: 14px;
            border-bottom: 10px solid var(--bg-color);
            border-left: 10px solid transparent;
        }

        #chat-container[data-theme="modern"][data-tail="bottom-left"] .chat-message::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 14px;
            border-top: 10px solid var(--bg-color);
            border-right: 10px solid transparent;
        }

        #chat-container[data-theme="modern"][data-tail="bottom-right"] .chat-message::after {
            content: '';
            position: absolute;
            bottom: -10px;
            right: 14px;
            border-top: 10px solid var(--bg-color);
            border-left: 10px solid transparent;
        }

        /* ==================================
           ---- レトロピクセルテーマ ----
           ================================== */
        /* ドット風の四角い枠とフォント */
        #chat-container[data-theme="retro"] .chat-message {
            font-family: 'DotGothic16', monospace;
            border: none !important;
            border-radius: 0 !important;
            margin: 4px 4px 8px 4px;
            /* 枠と影の分の余白 */
            background: var(--bg-color);
            /* エッジのドットを1つ削った「擬似円」のアウトラインを影で表現します */
            box-shadow:
                0 -4px 0 var(--name-color), 0 4px 0 var(--name-color),
                -4px 0 0 var(--name-color), 4px 0 0 var(--name-color),
                8px 8px 0 rgba(0, 0, 0, 0.4), 4px 8px 0 rgba(0, 0, 0, 0.4), 8px 4px 0 rgba(0, 0, 0, 0.4);
        }

        #chat-container[data-theme="retro"] .user-icon {
            border-radius: 0;
            border: 2px solid var(--name-color);
            image-rendering: auto;
            /* fallback */
            image-rendering: pixelated;
            /* ピクセルアート感を高める */
            margin-left: 4px;
        }

        /* ---- レトロピクセルのカクカクしっぽ ◣ ◢ （影絵技術で完全ドット化） ---- */
        #chat-container[data-theme="retro"] .chat-message::before,
        #chat-container[data-theme="retro"] .chat-message::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: transparent;
        }

        /* 左（真横）- 1ドット延長した◣ */
        #chat-container[data-theme="retro"][data-tail="left"] .chat-message::before {
            bottom: 12px;
            left: -16px;
            box-shadow:
                12px 0 0 var(--bg-color), 8px 0 0 var(--bg-color), 4px 0 0 var(--bg-color), 0 0 0 var(--bg-color),
                12px -4px 0 var(--bg-color), 8px -4px 0 var(--bg-color), 4px -4px 0 var(--bg-color),
                12px -8px 0 var(--bg-color), 8px -8px 0 var(--bg-color),
                12px -12px 0 var(--bg-color),

                0 4px 0 var(--name-color), 4px 4px 0 var(--name-color), 8px 4px 0 var(--name-color), 12px 4px 0 var(--name-color),
                -4px 0 0 var(--name-color), 0 -4px 0 var(--name-color), 4px -8px 0 var(--name-color), 8px -12px 0 var(--name-color), 12px -16px 0 var(--name-color);
        }

        /* 右（真横）- 1ドット延長した◢ */
        #chat-container[data-theme="retro"][data-tail="right"] .chat-message::after {
            bottom: 12px;
            left: 100%;
            box-shadow:
                0 0 0 var(--bg-color), 4px 0 0 var(--bg-color), 8px 0 0 var(--bg-color), 12px 0 0 var(--bg-color),
                0 -4px 0 var(--bg-color), 4px -4px 0 var(--bg-color), 8px -4px 0 var(--bg-color),
                0 -8px 0 var(--bg-color), 4px -8px 0 var(--bg-color),
                0 -12px 0 var(--bg-color),

                0 4px 0 var(--name-color), 4px 4px 0 var(--name-color), 8px 4px 0 var(--name-color), 12px 4px 0 var(--name-color),
                16px 0 0 var(--name-color), 12px -4px 0 var(--name-color), 8px -8px 0 var(--name-color), 4px -12px 0 var(--name-color), 0 -16px 0 var(--name-color);
        }

        /* レトロ真横しっぽのバッジ有無による高さ調整 */
        #chat-container[data-theme="retro"][data-tail="left"] .chat-message.has-badges::before,
        #chat-container[data-theme="retro"][data-tail="right"] .chat-message.has-badges::after {
            bottom: 4px;
        }

        /* 左上（斜め） */
        #chat-container[data-theme="retro"][data-tail="top-left"] .chat-message::before {
            top: -12px;
            left: 16px;
            box-shadow:
                0 8px 0 var(--bg-color), 4px 8px 0 var(--bg-color), 8px 8px 0 var(--bg-color),
                0 4px 0 var(--bg-color), 4px 4px 0 var(--bg-color), 0 0 0 var(--bg-color),
                -4px 8px 0 var(--name-color), -4px 4px 0 var(--name-color), -4px 0 0 var(--name-color),
                0 -4px 0 var(--name-color), 4px 0 0 var(--name-color), 8px 4px 0 var(--name-color), 12px 8px 0 var(--name-color);
        }

        /* 右上（斜め） */
        #chat-container[data-theme="retro"][data-tail="top-right"] .chat-message::after {
            top: -12px;
            right: 16px;
            box-shadow:
                0 8px 0 var(--bg-color), 4px 8px 0 var(--bg-color), 8px 8px 0 var(--bg-color),
                4px 4px 0 var(--bg-color), 8px 4px 0 var(--bg-color), 8px 0 0 var(--bg-color),
                12px 8px 0 var(--name-color), 12px 4px 0 var(--name-color), 12px 0 0 var(--name-color),
                8px -4px 0 var(--name-color), 4px 0 0 var(--name-color), 0 4px 0 var(--name-color), -4px 8px 0 var(--name-color);
        }

        /* 左下（斜め） */
        #chat-container[data-theme="retro"][data-tail="bottom-left"] .chat-message::before {
            bottom: -12px;
            left: 16px;
            box-shadow:
                0 0 0 var(--bg-color), 4px 0 0 var(--bg-color), 8px 0 0 var(--bg-color),
                0 4px 0 var(--bg-color), 4px 4px 0 var(--bg-color), 0 8px 0 var(--bg-color),
                -4px 0 0 var(--name-color), -4px 4px 0 var(--name-color), -4px 8px 0 var(--name-color),
                0 12px 0 var(--name-color), 4px 8px 0 var(--name-color), 8px 4px 0 var(--name-color), 12px 0 0 var(--name-color);
        }

        /* 右下（斜め） */
        #chat-container[data-theme="retro"][data-tail="bottom-right"] .chat-message::after {
            bottom: -12px;
            right: 16px;
            box-shadow:
                0 0 0 var(--bg-color), 4px 0 0 var(--bg-color), 8px 0 0 var(--bg-color),
                4px 4px 0 var(--bg-color), 8px 4px 0 var(--bg-color), 8px 8px 0 var(--bg-color),
                12px 0 0 var(--name-color), 12px 4px 0 var(--name-color), 12px 8px 0 var(--name-color),
                8px 12px 0 var(--name-color), 4px 8px 0 var(--name-color), 0 4px 0 var(--name-color), -4px 0 0 var(--name-color);
        }
    </style>
</head>

<body>
    <div id="chat-container"></div>

    <script>
        const DEFAULTS = {
            bgColor: 'rgba(30, 40, 20, 0.85)',
            nameColor: '#d5f0a0',
            fontSize: 16, borderRadius: 20, iconSize: 32,
            fadeOutDelay: 0, maxMessages: 50,
            stackMode: false, showIcons: true, showBadges: true,
            showName: false, badgePosition: 'bottom',
            designTheme: 'retro', tailPosition: 'left'
        };

        const firebaseConfig = {
            apiKey: "AIzaSyAjkMsdvypCH4BsoNcjSNp8GX6_bLbKsA8",
            authDomain: "seya-chat-trans.firebaseapp.com",
            databaseURL: "https://seya-chat-trans-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "seya-chat-trans"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function applySettings() {
            // ローカルストレージからの読み込み（フォールバック）
            let s = { ...DEFAULTS };
            try {
                const stored = localStorage.getItem('miniSettings');
                if (stored) s = { ...DEFAULTS, ...JSON.parse(stored) };
            } catch (e) { }

            // Firebaseのデータが優先的に上書きされます
            if (window._firebaseMiniSettings) {
                s = { ...s, ...window._firebaseMiniSettings };
            }

            const root = document.documentElement.style;
            root.setProperty('--bg-color', s.bgColor);
            root.setProperty('--name-color', s.nameColor);
            root.setProperty('--font-size', s.fontSize + 'px');
            root.setProperty('--border-radius', s.borderRadius + 'px');
            root.setProperty('--icon-size', s.iconSize + 'px');

            const container = document.getElementById('chat-container');
            container.classList.toggle('hide-icons', !s.showIcons);
            container.classList.toggle('hide-badges', !s.showBadges);
            container.classList.toggle('hide-names', !s.showName);
            container.setAttribute('data-badge-pos', s.badgePosition || 'bottom');
            container.setAttribute('data-theme', s.designTheme || 'retro');
            container.setAttribute('data-tail', s.tailPosition || 'left');
            document.body.classList.toggle('stack-mode', !!s.stackMode);

            window._miniSettings = s;
        }

        // Firebaseから設定をリアルタイム受信してOBSに同期！
        database.ref('chats_prompt/miniSettings').on('value', (snapshot) => {
            if (snapshot.exists()) {
                window._firebaseMiniSettings = snapshot.val();
                applySettings();
            }
        });

        applySettings();
        window.addEventListener('storage', (e) => {
            if (e.key === 'miniSettingsUpdate') applySettings();
        });

        // Twitchバッジを取得して表示する処理はPython側で行うようになり、URLが直接送られてきます
        const chatContainer = document.getElementById('chat-container');
        const pageLoadTime = Date.now();
        const shownKeys = new Set();

        database.ref('chats').limitToLast(15).on('child_added', (snapshot) => {
            if (shownKeys.has(snapshot.key)) return;
            shownKeys.add(snapshot.key);
            if (shownKeys.size > 200) {
                const arr = [...shownKeys];
                shownKeys.clear();
                arr.slice(-100).forEach(k => shownKeys.add(k));
            }

            const data = snapshot.val();
            if (data.timestamp && data.timestamp < pageLoadTime) return;

            const s = window._miniSettings || DEFAULTS;
            const userName = data.display_name || data.user || '名無し';
            const imgUrl = data.profile_image_url || '';
            const badges = data.badges || [];

            const el = document.createElement('div');
            el.className = 'chat-message';
            if (badges.length > 0) {
                el.classList.add('has-badges'); // バッジがある場合はクラスを付与
            }

            // バッジのURLを使って画像を表示します
            const badgesHtml = badges.map(bUrl => `<img class="badge" src="${bUrl}" alt="badge">`).join('');
            const iconHtml = imgUrl
                ? `<img src="${imgUrl}" alt="${userName}" class="user-icon" onerror="this.outerHTML='<div class=\\'user-icon-placeholder\\'>👤</div>'">`
                : `<div class="user-icon-placeholder">👤</div>`;

            // ミニモード: アイコン・バッジ・名前だけの自由配置モード
            el.innerHTML = `
                <div class="icon-badge-group">
                    ${iconHtml}
                    ${badgesHtml ? `<div class="badges">${badgesHtml}</div>` : ''}
                </div>
                <span class="user-name">${userName}</span>
            `;

            chatContainer.appendChild(el);

            el.addEventListener('animationend', () => {
                el.style.animation = 'none';
                el.style.opacity = '1';
                el.style.transform = 'none';
            }, { once: true });

            const maxMsg = s.maxMessages || 50;
            const isStack = s.stackMode;

            while (chatContainer.children.length > maxMsg + 5) {
                chatContainer.removeChild(chatContainer.firstChild);
            }
            if (!isStack || chatContainer.children.length > maxMsg) {
                while (chatContainer.children.length > maxMsg) {
                    chatContainer.removeChild(chatContainer.firstChild);
                }
            }

            // フェードアウト
            if (!isStack && s.fadeOutDelay && s.fadeOutDelay > 0) {
                setTimeout(() => {
                    el.classList.add('fading-out');
                    setTimeout(() => el.remove(), 600);
                }, s.fadeOutDelay * 1000);
            }
        });

        console.log("✅ ミニモードの準備完了！");
    </script>
</body>

</html>
