<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>seyak2b LIVE — Pink Bronson Mobile</title>

    <!--
        PixelMplus フォント使用
        作者: itouhiro 氏 (https://itouhiro.github.io/PixelMplus/)
        ライセンス: M+ FONTS LICENSE (改変・再配布自由)
    -->
    <style>
        @font-face {
            font-family: 'PixelMplus';
            src: url('assets/fonts/PixelMplus10-Regular.ttf') format('truetype');
            font-weight: normal;
        }
        @font-face {
            font-family: 'PixelMplus';
            src: url('assets/fonts/PixelMplus10-Bold.ttf') format('truetype');
            font-weight: bold;
        }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        /* ══════════════════════════════════════════════════
           Pink Bronson 1.0 | mobile.html
           Dynamic theme via /config/web_app
        ══════════════════════════════════════════════════ */
        :root {
            /* Dark theme defaults — /config/web_app で上書きされる */
            --bg:        #1C1C1C;
            --panel:     #242424;
            --lcd-bg:    #141800;
            --lcd-fg:    #AABF00;
            --lcd-dim:   #485400;
            --border:    #363636;
            --btn-bg:    #2A2A2A;
            --led-on:    #33CC00;
            --led-red:   #BB1100;
            --head:      #D0D0D0;
            --muted:     #606060;
            --accent:    #AABF00;
            --font:      'PixelMplus', 'Courier New', monospace;
            --font-sans: 'Noto Sans JP', 'PixelMplus', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--lcd-fg);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.4s, color 0.4s;
        }

        /* ── ヘッダー */
        .header {
            background: var(--panel);
            border-bottom: 2px solid var(--border);
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .led {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--led-on);
            box-shadow: 0 0 6px var(--led-on);
            flex-shrink: 0;
        }

        .header-title {
            font-size: 1em;
            font-weight: bold;
            color: var(--head);
            letter-spacing: 1px;
        }

        .header-sub { font-size: 0.65em; color: var(--muted); }

        /* TTS 解除ボタン */
        #tts-unlock-btn {
            margin-left: auto;
            background: var(--btn-bg);
            border: 1px solid var(--lcd-dim);
            color: var(--muted);
            font-family: var(--font);
            font-size: 0.65em;
            padding: 3px 8px;
            cursor: pointer;
            border-radius: 3px;
            white-space: nowrap;
            transition: color 0.3s, border-color 0.3s;
        }
        #tts-unlock-btn.active {
            color: var(--led-on);
            border-color: var(--led-on);
        }

        /* ── Twitch 埋め込み */
        .stream-wrapper { width: 100%; background: #000; }
        .stream-wrapper iframe {
            width: 100%; aspect-ratio: 16/9;
            border: none; display: block;
        }

        /* ── Golden Chain パネル */
        .gc-panel {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 6px 12px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .gc-card {
            flex-shrink: 0;
            background: var(--lcd-bg);
            border: 1px solid var(--lcd-dim);
            border-radius: 4px;
            padding: 6px 10px;
            min-width: 180px; max-width: 260px;
            transition: border-color 0.3s;
        }

        .gc-card-label {
            font-size: 0.6em;
            color: var(--lcd-dim);
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .gc-card-text {
            font-size: 0.75em;
            color: var(--lcd-fg);
            line-height: 1.5;
            word-break: break-all;
            font-family: var(--font-sans);
        }

        /* ── TTS 再生インジケータ */
        #tts-indicator {
            display: none;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 4px 12px;
            font-size: 0.65em;
            color: var(--led-on);
            letter-spacing: 1px;
            animation: blink 0.8s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        /* ── チャット */
        .chat-section-header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 5px 12px;
            font-size: 0.65em;
            color: var(--lcd-dim);
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #lang-indicator {
            margin-left: auto;
            font-size: 0.9em;
            color: var(--accent);
        }

        #chat-scroll {
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ── チャットアイテム */
        .chat-item {
            background: var(--lcd-bg);
            border: 1px solid var(--lcd-dim);
            border-radius: 4px;
            padding: 6px 10px;
            animation: slideUp 0.3s ease forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .chat-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
            flex-wrap: wrap;
        }

        .chat-avatar {
            width: 22px; height: 22px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--lcd-dim);
            flex-shrink: 0;
        }

        .chat-avatar-ph {
            width: 22px; height: 22px;
            border-radius: 50%;
            border: 1px solid var(--lcd-dim);
            background: var(--btn-bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; flex-shrink: 0;
        }

        .chat-badge { width: 14px; height: 14px; object-fit: contain; vertical-align: middle; }
        .chat-name  { font-weight: bold; font-size: 0.75em; color: var(--head); }
        .chat-time  { font-size: 0.6em; color: var(--muted); margin-left: auto; }

        .chat-lang-badge {
            font-size: 0.55em;
            background: var(--lcd-dim);
            color: var(--lcd-bg);
            border-radius: 3px;
            padding: 1px 4px;
        }

        .chat-main {
            font-family: var(--font-sans);
            font-size: 0.85em;
            line-height: 1.5;
            color: var(--lcd-fg);
            word-break: break-word;
        }

        .chat-original {
            font-size: 0.7em;
            color: var(--lcd-dim);
            margin-top: 2px;
            font-family: var(--font-sans);
            word-break: break-word;
        }

        .tl-icon { font-size: 0.8em; margin-right: 2px; }

        /* ── ステータスバー */
        .status-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--panel);
            border-top: 1px solid var(--border);
            padding: 4px 12px;
            font-size: 0.6em;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .status-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--led-on);
            margin-right: 4px;
        }
        .status-dot.error { background: var(--led-red); }

        /* ── Light theme */
        body.theme-light {
            --bg:      #e9e9f4;
            --panel:   #ffffff;
            --lcd-bg:  #f0f0fa;
            --lcd-dim: #9090b0;
            --border:  #c8c8d8;
            --btn-bg:  #d5d6e8;
            --head:    #1a1b26;
            --muted:   #787c99;
        }
    </style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
    <div class="led" id="led"></div>
    <div class="header-title">BLUE_RAY-BAN  //  MOBILE VIEW</div>
    <div class="header-sub">seyak2b LIVE</div>
    <button id="tts-unlock-btn" onclick="unlockTts()">🔇 TTS TAP TO ENABLE</button>
</div>

<!-- Twitch 埋め込み -->
<div class="stream-wrapper">
    <iframe id="twitch-embed" allowfullscreen></iframe>
</div>

<!-- Golden Chain パネル -->
<div class="gc-panel" id="gc-panel">
    <div class="gc-card">
        <div class="gc-card-label">▸ SUMMARY</div>
        <div class="gc-card-text" id="gc-summary-text">接続待機中...</div>
    </div>
    <div class="gc-card">
        <div class="gc-card-label">▸ TITLE</div>
        <div class="gc-card-text" id="gc-title-text">—</div>
    </div>
    <div class="gc-card">
        <div class="gc-card-label">▸ TOPIC</div>
        <div class="gc-card-text" id="gc-facilitator-text">—</div>
    </div>
</div>

<!-- TTS 再生インジケータ -->
<div id="tts-indicator">♪ TTS PLAYING...</div>

<!-- チャットヘッダー -->
<div class="chat-section-header">
    CHAT  //  REALTIME TRANSLATION FEED
    <span id="lang-indicator">JA</span>
</div>

<div id="chat-scroll"></div>

<!-- ステータスバー -->
<div class="status-bar">
    <span>
        <span class="status-dot" id="fb-dot"></span>
        <span id="fb-status">Firebase 接続中...</span>
    </span>
    <span id="tts-status" style="color: var(--muted)">TTS: —</span>
    <span id="msg-count">0 messages</span>
</div>

<script>
/* =====================================================
   Pink Bronson 1.0 — mobile.html
   /config/web_app  → テーマ・TTS・翻訳先 動的反映
   /config/tts_audio → base64 WAV を Web Audio で再生
   /chats           → リアルタイムチャット
   /golden_chain/*  → GoldenChain パネル
===================================================== */

// ── グローバル状態
let webTtsEnabled      = true;
let translationTarget  = 'ja';
let ttsAudioEnabled    = false;
let ttsUnlocked        = false;   // ユーザー操作で解除済みか
let lastTtsTimestamp   = Date.now(); // ページ読込前の音声を無視
let audioContext       = null;

// ── Twitch 埋め込み
(function() {
    const ch     = 'seyak2b';
    const parent = location.hostname || 'localhost';
    document.getElementById('twitch-embed').src =
        `https://player.twitch.tv/?channel=${ch}&parent=${encodeURIComponent(parent)}&autoplay=true&muted=false`;
})();

// ── チャット欄高さ調整
function resizeChatArea() {
    const els = ['.header', '.stream-wrapper', '.gc-panel',
                 '#tts-indicator', '.chat-section-header', '.status-bar'];
    let used = 0;
    els.forEach(sel => {
        const el = document.querySelector(sel);
        if (el) used += el.offsetHeight;
    });
    const h = Math.max(120, window.innerHeight - used - 8);
    document.getElementById('chat-scroll').style.height = h + 'px';
}
window.addEventListener('resize', resizeChatArea);
setTimeout(resizeChatArea, 500);

// ── Firebase 設定
const firebaseConfig = {
    apiKey:      "AIzaSyAjkMsdvypCH4BsoNcjSNp8GX6_bLbKsA8",
    authDomain:  "seya-chat-trans.firebaseapp.com",
    databaseURL: "https://seya-chat-trans-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:   "seya-chat-trans"
};

let database;
let _listenersInit = false;

try {
    firebase.initializeApp(firebaseConfig);
    database = firebase.database();
    console.log('✅ Firebase 初期化完了');
} catch (e) {
    document.getElementById('fb-dot').classList.add('error');
    document.getElementById('fb-status').textContent = '接続失敗: ' + e.message;
    console.error('Firebase 初期化失敗:', e);
}

// ── 匿名サインイン (視聴者は自動認証、操作不要)
firebase.auth().onAuthStateChanged(user => {
    if (user) {
        initListeners();
    }
});

firebase.auth().signInAnonymously()
    .catch(e => console.warn('[Auth] 匿名サインイン失敗:', e));

// ══════════════════════════════════════════════════════
//  Web Config 適用 (/config/web_app)
// ══════════════════════════════════════════════════════
function applyWebConfig(cfg) {
    if (!cfg) return;

    // TTS 設定
    webTtsEnabled   = cfg.tts_enabled     !== false;
    ttsAudioEnabled = cfg.tts_audio_enabled === true;
    document.getElementById('tts-status').textContent =
        ttsAudioEnabled ? (webTtsEnabled ? 'TTS: ON' : 'TTS: OFF') : 'TTS: NO AUDIO';
    document.getElementById('tts-status').style.color =
        (ttsAudioEnabled && webTtsEnabled) ? 'var(--led-on)' : 'var(--muted)';

    // 翻訳先言語
    translationTarget = cfg.translation_target || 'ja';
    const langLabels = { ja: 'JA', en: 'EN', ko: 'KO', zh: 'ZH' };
    document.getElementById('lang-indicator').textContent =
        langLabels[translationTarget] || translationTarget.toUpperCase();

    // UI テーマ
    if (cfg.ui_theme === 'light') {
        document.body.classList.add('theme-light');
    } else {
        document.body.classList.remove('theme-light');
    }

    // UI カラー
    if (cfg.ui_primary_color) {
        const c = cfg.ui_primary_color;
        document.documentElement.style.setProperty('--lcd-fg',  c);
        document.documentElement.style.setProperty('--accent',  c);
        // dim は primary を暗くした色 (alpha 50%)
        document.documentElement.style.setProperty('--lcd-dim',
            cfg.ui_theme === 'light' ? '#9090b0' : dimColor(c));
    }

    resizeChatArea();
    console.log('[web_app] 設定反映:', cfg);
}

/** 16進カラーを約50%暗くして返す */
function dimColor(hex) {
    try {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        const dr = Math.floor(r * 0.45).toString(16).padStart(2,'0');
        const dg = Math.floor(g * 0.45).toString(16).padStart(2,'0');
        const db = Math.floor(b * 0.45).toString(16).padStart(2,'0');
        return `#${dr}${dg}${db}`;
    } catch { return '#485400'; }
}

// ══════════════════════════════════════════════════════
//  TTS 音声再生 (/config/tts_audio)
// ══════════════════════════════════════════════════════

/** ユーザー操作で AudioContext を解除 */
function unlockTts() {
    if (ttsUnlocked) return;
    try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        // 無音バッファを再生してロックを解除
        const buf = audioContext.createBuffer(1, 1, 22050);
        const src = audioContext.createBufferSource();
        src.buffer = buf;
        src.connect(audioContext.destination);
        src.start(0);
        ttsUnlocked = true;
        const btn = document.getElementById('tts-unlock-btn');
        btn.textContent = '🔊 TTS ENABLED';
        btn.classList.add('active');
        console.log('[TTS] AudioContext 解除完了');
    } catch (e) {
        console.warn('[TTS] AudioContext 解除失敗:', e);
    }
}

/** base64 WAV を Web Audio API で再生 */
function playBase64Audio(b64, text) {
    if (!ttsUnlocked || !audioContext) {
        console.log('[TTS] 未解除のためスキップ (TAP TO ENABLE を押してください)');
        return;
    }
    try {
        const binary = atob(b64);
        const bytes  = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);

        const indic = document.getElementById('tts-indicator');
        indic.style.display = 'block';
        indic.textContent   = '♪ TTS: ' + (text || 'PLAYING...');
        resizeChatArea();

        audioContext.decodeAudioData(bytes.buffer, (decoded) => {
            const src = audioContext.createBufferSource();
            src.buffer = decoded;
            src.connect(audioContext.destination);
            src.start(0);
            src.onended = () => {
                indic.style.display = 'none';
                resizeChatArea();
            };
            console.log('[TTS] ▶ 再生開始:', text);
        }, (err) => {
            indic.style.display = 'none';
            resizeChatArea();
            console.warn('[TTS] decode エラー:', err);
        });
    } catch (e) {
        document.getElementById('tts-indicator').style.display = 'none';
        resizeChatArea();
        console.error('[TTS] 再生失敗:', e);
    }
}

// ══════════════════════════════════════════════════════
//  チャット表示
// ══════════════════════════════════════════════════════
const pageLoadTime = Date.now();
const shownKeys    = new Set();
let msgCount       = 0;
const chatScroll   = document.getElementById('chat-scroll');

function fmtTime(ts) {
    const d = ts ? new Date(ts) : new Date();
    return d.getHours().toString().padStart(2,'0') + ':' +
           d.getMinutes().toString().padStart(2,'0');
}

function esc(s) {
    return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addChat(data, key) {
    if (shownKeys.has(key)) return;
    shownKeys.add(key);
    if (shownKeys.size > 300) {
        const arr = [...shownKeys];
        shownKeys.clear();
        arr.slice(-150).forEach(k => shownKeys.add(k));
    }
    if (data.timestamp && data.timestamp < pageLoadTime) return;

    const name    = esc(data.display_name || data.user || '名無し');
    const origTxt = esc(data.text || '');
    const transTxt  = esc(data.translated_text || '');   // 日本語翻訳
    const transEnTxt = esc(data.translated_en  || '');   // 英語翻訳
    const imgUrl  = data.profile_image_url || '';
    const badges  = data.badges || [];
    const lang    = data.lang || '';
    const source  = data.source || 'twitch';
    const timeStr = fmtTime(data.timestamp);

    // 翻訳先に応じてメインテキストと原文表示を切り替え
    let mainTxt, origHtml;
    if (translationTarget === 'en') {
        mainTxt  = transEnTxt || origTxt;
        origHtml = (transEnTxt && transEnTxt !== origTxt)
            ? `<div class="chat-original"><span class="tl-icon">🇬🇧</span>${origTxt}</div>`
            : '';
    } else if (translationTarget === 'ja') {
        const isTranslated = data.is_translated && transTxt;
        mainTxt  = isTranslated ? transTxt : origTxt;
        origHtml = isTranslated
            ? `<div class="chat-original"><span class="tl-icon">🌐</span>${origTxt}</div>`
            : '';
    } else {
        // ko / zh など: 原文をそのまま表示
        mainTxt  = origTxt;
        origHtml = '';
    }

    const iconHtml = imgUrl
        ? `<img src="${imgUrl}" class="chat-avatar" onerror="this.outerHTML='<div class=\\'chat-avatar-ph\\'>👤</div>'">`
        : `<div class="chat-avatar-ph">👤</div>`;

    const badgesHtml = badges
        .map(b => `<img src="${esc(b)}" class="chat-badge" alt="">`)
        .join('');

    const langBadge   = lang   ? `<span class="chat-lang-badge">${esc(lang)}</span>` : '';
    const sourceBadge = source === 'rolex'
        ? `<span class="chat-lang-badge" style="background:#2a3a00">📡</span>` : '';
    const mobileBadge = source === 'mobile_viewer'
        ? `<span class="chat-lang-badge" style="background:#001a2a">📱</span>` : '';

    const el = document.createElement('div');
    el.className = 'chat-item';
    el.innerHTML = `
        <div class="chat-meta">
            ${iconHtml}${badgesHtml}
            <span class="chat-name">${name}</span>
            ${langBadge}${sourceBadge}${mobileBadge}
            <span class="chat-time">${timeStr}</span>
        </div>
        <div class="chat-main">${mainTxt}</div>
        ${origHtml}
    `;

    chatScroll.appendChild(el);
    el.addEventListener('animationend', () => {
        el.style.animation = 'none';
        el.style.opacity   = '1';
    }, { once: true });

    while (chatScroll.children.length > 40) {
        chatScroll.removeChild(chatScroll.firstChild);
    }
    chatScroll.scrollTop = chatScroll.scrollHeight;
    msgCount++;
    document.getElementById('msg-count').textContent = msgCount + ' messages';
    resizeChatArea();
}

// ══════════════════════════════════════════════════════
//  Firebase リスナー群
// ══════════════════════════════════════════════════════
// ── Firebase リスナー群 (認証後に一度だけ呼ばれる)
function initListeners() {
    if (_listenersInit || !database) return;
    _listenersInit = true;

    // /config/web_app — 設定をリアルタイム反映
    database.ref('config/web_app').on('value', (snap) => {
        applyWebConfig(snap.val());
    });

    // /config/tts_audio — base64 WAV を受信して再生
    database.ref('config/tts_audio').on('value', (snap) => {
        const data = snap.val();
        if (!data || !data.audio_b64) return;
        if (!data.timestamp || data.timestamp <= lastTtsTimestamp) return;
        if (!webTtsEnabled || !ttsAudioEnabled) return;
        lastTtsTimestamp = data.timestamp;
        playBase64Audio(data.audio_b64, data.text || '');
    });

    // /chats — リアルタイムチャット
    database.ref('chats')
        .limitToLast(30)
        .on('child_added', (snapshot) => {
            addChat(snapshot.val(), snapshot.key);
        });

    // /golden_chain — GoldenChain パネル
    function watchGC(key, elId) {
        database.ref(`golden_chain/${key}`).on('value', (snap) => {
            const data = snap.val();
            if (data && data.text) {
                const el = document.getElementById(elId);
                if (el) {
                    el.textContent = data.text;
                    el.parentElement.style.borderColor = 'var(--accent)';
                    setTimeout(() => {
                        el.parentElement.style.borderColor = 'var(--lcd-dim)';
                    }, 2000);
                }
            }
        });
    }
    watchGC('summary',     'gc-summary-text');
    watchGC('title',       'gc-title-text');
    watchGC('facilitator', 'gc-facilitator-text');

    document.getElementById('fb-dot').style.background = '#33CC00';
    document.getElementById('fb-status').textContent   = 'LIVE';
    document.getElementById('led').style.boxShadow     = '0 0 6px #33CC00';
}

window.addEventListener('load', resizeChatArea);
console.log('✅ Pink Bronson Mobile View 準備完了');
</script>
</body>
</html>
