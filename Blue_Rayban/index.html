<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Twitch Chat Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        /* CSSカスタムプロパティ（変数）で設定値を受け取ります。
           settings.html の保存ボタンを押すと、ここの値がJSによって書き換えられます。 */
        :root {
            --grad-color1: #3a4a1a;
            --grad-color2: #5a7a25;
            --grad-color3: #7aaa35;
            --text-color: #ffffff;
            --name-color: #d5f0a0;
            --font-size: 16px;
            --border-radius: 14px;
            --chat-width: 480px;
            --icon-size: 44px;
            --shadow-opacity: 0.40;
            --anim-duration: 0.45s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: transparent;
            padding: 16px;
            font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif;
            /* OBSでは height を固定して overflow:hidden にする必要があります。
               こうしないとメッセージが画面外に溢れ続け、消さないと表示が残ります。 */
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* 積み上げモード：上から下に向かって積み上がる */
        body.stack-mode {
            justify-content: flex-start;
        }

        /* テストモードバッジ */
        #test-mode-badge {
            display: none;
            position: fixed;
            top: 8px;
            right: 8px;
            background: rgba(255, 80, 80, 0.85);
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 9999;
            font-family: 'Noto Sans JP', sans-serif;
            backdrop-filter: blur(4px);
        }

        body.test-mode #test-mode-badge {
            display: block;
        }

        #chat-container {
            width: 100%;
            max-width: var(--chat-width);
            display: flex;
            flex-direction: column;
            gap: 10px;
            /* OBS描画パフォーマンス向上: GPU合成レイヤーを明示的に作成 */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        .chat-message {
            background: linear-gradient(135deg,
                    var(--grad-color1) 0%,
                    var(--grad-color2) 60%,
                    var(--grad-color3) 100%);
            border-radius: var(--border-radius);
            padding: 10px 14px 10px 10px;
            color: var(--text-color);
            box-shadow: 0 4px 12px rgba(0, 0, 0, var(--shadow-opacity));
            animation: chatSlideIn var(--anim-duration) cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            opacity: 0;
            word-wrap: break-word;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: var(--font-size);
        }

        /* アニメーション定義 --- settings.html で選択したタイプによって切り替えます */
        @keyframes chatSlideIn {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes chatFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes chatScaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* アニメ種類クラス */
        .anim-slide {
            animation-name: chatSlideIn;
            transform: translateY(24px);
        }

        .anim-fadein {
            animation-name: chatFadeIn;
        }

        .anim-scale {
            animation-name: chatScaleIn;
            transform: scale(0.8);
        }

        /* メッセージがフェードアウトする場合 */
        .fading-out {
            animation: chatFadeOut 0.5s ease forwards !important;
        }

        @keyframes chatFadeOut {
            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        .user-icon {
            width: var(--icon-size);
            height: var(--icon-size);
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.5);
            flex-shrink: 0;
            background-color: #4a6a20;
        }

        .user-icon-placeholder {
            width: var(--icon-size);
            height: var(--icon-size);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--icon-size) * 0.5);
        }

        .message-body {
            flex: 1;
            min-width: 0;
        }

        .user-header {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.9em;
            line-height: 1;
        }

        /* バッジ画像を直接表示するためのスタイル */
        img.badge {
            width: 1.1em;
            height: 1.1em;
            vertical-align: middle;
            object-fit: contain;
        }

        .user-name {
            font-weight: bold;
            font-size: 0.85em;
            color: var(--name-color);
        }

        .message-timestamp {
            font-size: 0.72em;
            color: rgba(255, 255, 255, 0.4);
            font-weight: normal;
        }

        .message-text {
            font-size: 1em;
            line-height: 1.5;
            color: var(--text-color);
        }

        /* 非表示クラス（settings.htmlのトグルで制御） */
        .hide-icons .user-icon,
        .hide-icons .user-icon-placeholder {
            display: none !important;
        }

        .hide-badges .badge {
            display: none !important;
        }

        .hide-name .user-name {
            display: none !important;
        }

        .hide-time .message-timestamp {
            display: none !important;
        }

        /* 翻訳表示用スタイル */
        .translated-text {
            font-size: 1em;
            line-height: 1.5;
            color: var(--text-color);
        }

        /* 上下配置の原文 */
        .original-text {
            font-size: var(--original-font-size, 12px);
            color: var(--original-text-color, #b0cca0);
            line-height: 1.4;
            opacity: 0.85;
            margin-top: 2px;
        }

        .original-text.above {
            margin-top: 0;
            margin-bottom: 3px;
        }

        /* 横並びゾーン（left / right モード）*/
        .text-area-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .text-area-row .translated-text {
            flex: 1;
            min-width: 0;
        }

        /* 横並び時の原文ブロック（小さい枠）*/
        .original-text-block {
            flex-shrink: 0;
            max-width: 42%;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: var(--original-font-size, 12px);
            color: var(--original-text-color, #b0cca0);
            line-height: 1.4;
            border: 1px solid rgba(255, 255, 255, 0.12);
            word-break: break-word;
        }

        .translation-label {
            font-size: 0.72em;
            color: rgba(255, 255, 255, 0.45);
            margin-right: 3px;
        }

        .hide-original .original-text,
        .hide-original .original-text-block {
            display: none !important;
        }

        .hide-translation-label .translation-label {
            display: none !important;
        }
    </style>
</head>

<body>

    <div id="test-mode-badge">🧪 TEST MODE</div>
    <div id="chat-container"></div>

    <script>
        /* =========================================
           1. 設定の読み込みと CSS 変数への反映
           ========================================= */

        const DEFAULTS = {
            gradColor1: '#3a4a1a', gradColor2: '#5a7a25', gradColor3: '#7aaa35',
            textColor: '#ffffff', nameColor: '#d5f0a0',
            fontSize: 16, borderRadius: 14, chatWidth: 480, iconSize: 44, shadowOpacity: 40,
            animType: 'slide', animDuration: 0.45, fadeOutDelay: 0, maxMessages: 20,
            stackMode: false,
            showIcons: true, showBadges: true, showName: true, showTime: true,
            translationEnabled: true,
            originalTextPosition: 'right',
            originalTextColor: '#b0cca0',
            originalFontSize: 12,
            showTranslationLabel: true,
        };

        // LocalStorageから設定を読み込んで適用します
        function applySettings() {
            let s = { ...DEFAULTS };
            try {
                const stored = localStorage.getItem('chatSettings');
                if (stored) s = { ...DEFAULTS, ...JSON.parse(stored) };
            } catch (e) { }

            const root = document.documentElement.style;
            root.setProperty('--grad-color1', s.gradColor1);
            root.setProperty('--grad-color2', s.gradColor2);
            root.setProperty('--grad-color3', s.gradColor3);
            root.setProperty('--text-color', s.textColor);
            root.setProperty('--name-color', s.nameColor);
            root.setProperty('--font-size', s.fontSize + 'px');
            root.setProperty('--border-radius', s.borderRadius + 'px');
            root.setProperty('--chat-width', s.chatWidth + 'px');
            root.setProperty('--icon-size', s.iconSize + 'px');
            root.setProperty('--shadow-opacity', (s.shadowOpacity / 100).toFixed(2));
            root.setProperty('--anim-duration', s.animDuration + 's');
            root.setProperty('--original-text-color', s.originalTextColor || '#b0cca0');
            root.setProperty('--original-font-size', (s.originalFontSize || 12) + 'px');

            // 表示/非表示クラスの付け外し
            const container = document.getElementById('chat-container');
            container.classList.toggle('hide-icons', !s.showIcons);
            container.classList.toggle('hide-badges', !s.showBadges);
            container.classList.toggle('hide-name', !s.showName);
            container.classList.toggle('hide-time', !s.showTime);
            // 翻訳設定の反映
            const hideOrig = !s.translationEnabled || s.originalTextPosition === 'hidden';
            container.classList.toggle('hide-original', hideOrig);
            container.classList.toggle('hide-translation-label', !s.showTranslationLabel);
            // 積み上げモード
            document.body.classList.toggle('stack-mode', !!s.stackMode);

            window._chatSettings = s;
        }

        applySettings();

        // settings.html で保存したとき（別タブ）にリアルタイム反映します
        window.addEventListener('storage', (e) => {
            if (e.key === 'chatSettingsUpdate') applySettings();
        });

        /* =========================================
           2. バッジ絵文字マップ
          // 旧バッジ変換処理（絵文字への変換）は削除されました。
        // 代わりにPythonバックエンドからTwitch公式の画像URLリストが送られてきます。

        /* =========================================
           3. Firebase 接続
           ========================================= */
        const firebaseConfig = {
            apiKey: "AIzaSyAjkMsdvypCH4BsoNcjSNp8GX6_bLbKsA8",
            authDomain: "seya-chat-trans.firebaseapp.com",
            databaseURL: "https://seya-chat-trans-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "seya-chat-trans"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const chatContainer = document.getElementById('chat-container');

        /* =========================================
           4. ページ読み込み時刻の記録（OBS対策の核心！）
           ========================================= */
        // ページが開かれた時刻をミリ秒で記録します。
        // Firebaseに「この時刻より後に届いたチャットだけ教えて！」と指定することで、
        // OBSがリロードしても過去のチャットが再表示されなくなります！
        const pageLoadTime = Date.now();
        const shownKeys = new Set(); // 念のための重複防止

        /* =========================================
           5. 新しいチャットを追加する処理
           ========================================= */
        database.ref('chats')
            .limitToLast(25)
            .on('child_added', (snapshot) => {
                // 重複チェック: 念のため同じキーは二度表示しません
                if (shownKeys.has(snapshot.key)) return;
                shownKeys.add(snapshot.key);
                // メモリリーク防止: shownKeysが大きくなりすぎたら古いものを削除
                if (shownKeys.size > 300) {
                    const arr = [...shownKeys];
                    shownKeys.clear();
                    arr.slice(-150).forEach(k => shownKeys.add(k));
                }

                const data = snapshot.val();

                // ページ読み込み前のチャットはスキップします（OBS対策）
                // Firebase の timestamp はサーバー側のミリ秒数値です
                if (data.timestamp && data.timestamp < pageLoadTime) return;
                const s = window._chatSettings || DEFAULTS;
                const userName = data.display_name || data.user || '名無し';
                const originalText = data.text || '';               // 元のテキスト
                const translatedTxt = data.translated_text || '';    // Gemini翻訳テキスト
                const isTranslated = data.is_translated && translatedTxt && s.translationEnabled;
                const imgUrl = data.profile_image_url || '';
                const badges = data.badges || [];
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

                const el = document.createElement('div');
                el.className = 'chat-message anim-' + (s.animType || 'slide');

                const badgesHtml = badges.map(bUrl => `<img class="badge" src="${bUrl}" alt="badge">`).join('');
                const iconHtml = imgUrl
                    ? `<img src="${imgUrl}" alt="${userName}" class="user-icon" onerror="this.outerHTML='<div class=\\'user-icon-placeholder\\'>👤</div>'">`
                    : `<div class="user-icon-placeholder">👤</div>`;

                // 翻訳済みの場合は翻訳文をメイン、原文をサブで表示します
                const mainText = isTranslated ? translatedTxt : originalText;
                const pos = s.originalTextPosition || 'above';
                const origHtml = isTranslated
                    ? `<span class="translation-label">🌐</span>${originalText}`
                    : '';

                // 原文の配置に応じてレイアウトを組み立てます
                let contentHtml;
                if (!isTranslated) {
                    // 翻訳なし（日本語など）はそのまま表示
                    contentHtml = `<div class="translated-text">${mainText}</div>`;
                } else if (pos === 'right') {
                    // 翻訳文（左・広い） | 原文ブロック（右・狭い）
                    contentHtml = `
                        <div class="text-area-row">
                            <div class="translated-text">${mainText}</div>
                            <div class="original-text-block">${origHtml}</div>
                        </div>`;
                } else if (pos === 'left') {
                    // 原文ブロック（左・狭い） | 翻訳文（右・広い）
                    contentHtml = `
                        <div class="text-area-row">
                            <div class="original-text-block">${origHtml}</div>
                            <div class="translated-text">${mainText}</div>
                        </div>`;
                } else if (pos === 'above') {
                    contentHtml = `<div class="original-text above">${origHtml}</div><div class="translated-text">${mainText}</div>`;
                } else {
                    // below or default
                    contentHtml = `<div class="translated-text">${mainText}</div><div class="original-text">${origHtml}</div>`;
                }

                el.innerHTML = `
            ${iconHtml}
            <div class="message-body">
                <div class="user-header">
                    ${badgesHtml}
                    <span class="user-name">${userName}</span>
                    <span class="message-timestamp">${timeStr}</span>
                </div>
                ${contentHtml}
            </div>
        `;

                chatContainer.appendChild(el);

                // ★ OBS対策1: アニメーションが終わったらCSSを除去してGPUメモリを解放する
                el.addEventListener('animationend', () => {
                    el.style.animation = 'none';
                    el.style.opacity = '1';
                    el.style.transform = 'none';
                }, { once: true });

                // ★ OBS対策2: DOM要素数の二重ガード
                const maxMsg = s.maxMessages || 20;
                const isStack = s.stackMode;
                while (chatContainer.children.length > maxMsg + 5) {
                    chatContainer.removeChild(chatContainer.firstChild);
                }
                if (!isStack || chatContainer.children.length > maxMsg) {
                    while (chatContainer.children.length > maxMsg) {
                        chatContainer.removeChild(chatContainer.firstChild);
                    }
                }

                // フェードアウト機能（積み上げモード時は無効）
                if (!isStack && s.fadeOutDelay && s.fadeOutDelay > 0) {
                    setTimeout(() => {
                        el.classList.add('fading-out');
                        setTimeout(() => el.remove(), 600);
                    }, s.fadeOutDelay * 1000);
                }
            });

        console.log("✅ チャット表示の準備完了！");

        /* =========================================
           6. OBSテストモード（URLに ?testmode=1 があると起動）
           ダミーチャットを自動送信して外観を確認できます。
           ========================================= */
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('testmode') === '1') {
            document.body.classList.add('test-mode');
            console.log('🧪 テストモード起動！');

            const testMessages = [
                { user: 'seyak2b', text: '配信お疲れさま！🌟', badges: ['機局·拡開者'], lang: 'ja', translated_text: '', is_translated: false },
                { user: 'TestUser1', text: 'Great stream! Love it!', badges: ['サブスクライバー'], lang: 'en', translated_text: 'すごい配信！大好き！', is_translated: true },
                { user: 'KoreanFan', text: '안녕하세요! 좋아요~', badges: [], lang: 'ko', translated_text: 'こんにちは！大好き～', is_translated: true },
                { user: 'viewer_jp', text: 'こんにちはこんにちは～', badges: ['サブスクライバー'], lang: 'ja', translated_text: '', is_translated: false },
                { user: 'RusFan99', text: 'Привет! Очень интересно!', badges: [], lang: 'ru', translated_text: 'こんにちは！とても面白い！', is_translated: true },
                { user: 'mod_chan', text: 'スパムはタイムアウトにします！', badges: ['モデレーター'], lang: 'ja', translated_text: '', is_translated: false },
                { user: 'TestUser2', text: 'lol this is so funny xD', badges: [], lang: 'en', translated_text: 'あなた！これ最高に面白い！', is_translated: true },
            ];

            let idx = 0;
            function sendTestMessage() {
                const msg = testMessages[idx % testMessages.length];
                idx++;
                const s = window._chatSettings || DEFAULTS;
                const now = new Date();
                const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
                const isTranslated = msg.is_translated && msg.translated_text && s.translationEnabled;
                const mainText = isTranslated ? msg.translated_text : msg.text;
                const origHtml = isTranslated ? `<span class="translation-label">🌐</span>${msg.text}` : '';
                const pos = s.originalTextPosition || 'right';

                let contentHtml;
                if (!isTranslated) {
                    contentHtml = `<div class="translated-text">${mainText}</div>`;
                } else if (pos === 'right') {
                    contentHtml = `<div class="text-area-row"><div class="translated-text">${mainText}</div><div class="original-text-block">${origHtml}</div></div>`;
                } else if (pos === 'left') {
                    contentHtml = `<div class="text-area-row"><div class="original-text-block">${origHtml}</div><div class="translated-text">${mainText}</div></div>`;
                } else if (pos === 'above') {
                    contentHtml = `<div class="original-text above">${origHtml}</div><div class="translated-text">${mainText}</div>`;
                } else {
                    contentHtml = `<div class="translated-text">${mainText}</div><div class="original-text">${origHtml}</div>`;
                }

                const el = document.createElement('div');
                el.className = 'chat-message anim-' + (s.animType || 'slide');
                el.innerHTML = `
                    <div class="user-icon-placeholder">👤</div>
                    <div class="message-body">
                        <div class="user-header">
                            ${msg.badges.map(b => `<span class="badge">${b}</span>`).join('')}
                            <span class="user-name">${msg.user}</span>
                            <span class="message-timestamp">${timeStr}</span>
                        </div>
                        ${contentHtml}
                    </div>`;
                chatContainer.appendChild(el);

                const isStack = s.stackMode;
                if (!isStack || chatContainer.children.length > (s.maxMessages || 20)) {
                    while (chatContainer.children.length > (s.maxMessages || 20)) {
                        chatContainer.removeChild(chatContainer.firstChild);
                    }
                }
                if (!isStack && s.fadeOutDelay && s.fadeOutDelay > 0) {
                    setTimeout(() => {
                        el.classList.add('fading-out');
                        setTimeout(() => el.remove(), 600);
                    }, s.fadeOutDelay * 1000);
                }
            }

            // 2秒間隔でダミーメッセージを送り続けます
            setTimeout(sendTestMessage, 500);
            setInterval(sendTestMessage, 2000);
        }
    </script>
</body>

</html>
